<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - E-Commerce Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Critical CSS inline untuk menghindari flicker */
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #9068cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            opacity: 1;
            visibility: visible;
        }
        
        .login-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            width: 100%;
            max-width: 28rem;
            margin: 1rem;
            opacity: 1;
            visibility: visible;
        }
        
        .login-header {
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            color: white;
            text-align: center;
            padding: 3rem;
        }
        
        .login-header i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .login-form {
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .alert-error {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .alert-success {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .register-link {
            color: #4e73df;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .register-link:hover {
            color: #2e59d9;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-store"></i>
            <h2>Admin Dashboard</h2>
            <p>E-Commerce Management</p>
        </div>
        
        <div class="login-form">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i>Username
                    </label>
                    <input type="text" id="username" name="username" class="form-input" 
                           placeholder="Masukkan username admin" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>Password
                    </label>
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="Masukkan password" required>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    Masuk
                </button>
            </form>
            
            <!-- Navigation to register -->
            <div class="login-footer" style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e5e7eb;">
                <p style="color: #6b7280; font-size: 14px;">
                    Belum punya akun admin? 
                <a href="register.html" class="register-link" id="registerLink">📝 Daftar di sini</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        console.log('🔍 Login page loading...');
        // Pastikan link register tidak diblokir event JS global

        
        // Initialize login form
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('📝 Login form submitted');
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            console.log('🔍 Login attempt:', username);
            
            // Basic validation
            if (!username) {
                showError('Username tidak boleh kosong!');
                return;
            }
            
            if (!password) {
                showError('Password tidak boleh kosong!');
                return;
            }
            
            // Show loading state
            const submitButton = document.querySelector('button[type="submit"]');
            const originalText = submitButton.innerHTML;
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            submitButton.disabled = true;
            
            try {
                // Hanya gunakan backend API untuk login
                const apiUrl = `http://localhost:5000/api/login`;
                console.log('🔍 Trying API URL:', apiUrl);
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.admin && data.token) {
                            console.log('✅ Backend API login successful');
                            showSuccess('Login berhasil! Mengarahkan ke dashboard...');
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('userName', username);
                            localStorage.setItem('token', data.token);
                            setTimeout(function() {
                                window.location.href = 'index.html';
                            }, 500);
                            return;
                        } else {
                            throw new Error(data.error || 'Login gagal');
                        }
                    } else {
                        const data = await response.json().catch(() => ({}));
                        throw new Error(data.error || 'Server error: ' + response.status);
                    }
                } catch (apiError) {
                    console.log('⚠️ Backend API error:', apiError.message);
                    throw new Error('Tidak dapat terhubung ke server. Coba lagi nanti.');
                }
                
            } catch (error) {
                console.error('❌ Login error:', error.message);
                
                // Show custom alert
                showError(error.message);
                
            } finally {
                // Reset button state
                submitButton.innerHTML = originalText;
                submitButton.disabled = false;
            }
        });
        
        // Show error function
        function showError(message) {
            console.log('🚨 Showing error:', message);
            
            // Remove existing alerts
            const existingAlerts = document.querySelectorAll('.alert-error, .alert-success');
            existingAlerts.forEach(alert => alert.remove());
            
            // Create error alert
            const alert = document.createElement('div');
            alert.className = 'alert-error';
            alert.innerHTML = `
                <i class="fas fa-exclamation-circle"></i>
                <span>${message}</span>
                <button type="button" onclick="this.parentElement.remove()" 
                        style="margin-left: auto; background: none; border: none; cursor: pointer; color: #dc2626;">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            // Insert after form
            const form = document.getElementById('loginForm');
            form.parentNode.insertBefore(alert, form.nextSibling);
            
            // Auto-hide after 8 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 8000);
        }
        
        // Show success function
        function showSuccess(message) {
            console.log('✅ Showing success:', message);
            
            // Remove existing alerts
            const existingAlerts = document.querySelectorAll('.alert-error, .alert-success');
            existingAlerts.forEach(alert => alert.remove());
            
            // Create success alert
            const alert = document.createElement('div');
            alert.className = 'alert-success';
            alert.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <span>${message}</span>
            `;
            
            // Insert after form
            const form = document.getElementById('loginForm');
            form.parentNode.insertBefore(alert, form.nextSibling);
        }
        
        // Username validation (optional, only allow alphanumeric/underscore)
        // function isValidUsername(username) {
        //     const usernameRegex = /^[a-zA-Z0-9_]+$/;
        //     return usernameRegex.test(username);
        // }
        
        // Check if already logged in
        console.log('🎉 Login page ready');
    </script>
</body>
</html>
